name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * *"   # daily 07:00 UTC — catch live API contract drift
  workflow_dispatch:

jobs:
  tests:
    name: Unit tests (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Python unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
      - name: JS unit tests
        run: node --test app/test/*.test.js

  verify-live:
    name: Verify data vs live Lagoon API
    # Informational check against the live (undocumented, no-SLA) Lagoon API — it can
    # catch API-side drift (run ordering, timezone, course renumbering) the offline
    # tests can't. It is NON-BLOCKING: continue-on-error means a red here never fails
    # the run, because it depends on a flaky third party. verify_data.py already skips
    # (exit 0) when the API is simply unreachable; continue-on-error covers the rest.
    # Skipped on PRs so it's never in a merge gate.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: verify_data.py
        run: python verify_data.py
