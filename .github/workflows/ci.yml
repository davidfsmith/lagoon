name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * *"   # daily 07:00 UTC — catch live API contract drift
  workflow_dispatch:

jobs:
  tests:
    name: Unit tests (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Python unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
      - name: AWS Lambda unit tests
        # Run each Lambda's suite in a SEPARATE pytest process — both define a
        # module named `handler`, which collides in one shared session. The watcher
        # suite needs the repo root on the path for `import lagoon_client`.
        run: |
          python -m pip install --quiet pytest
          PYTHONPATH="$PWD" python -m pytest aws/lambda/test_push.py aws/lambda/test_notify_filter.py -q
          python -m pytest aws/lambda-register/test_register.py -q
      - name: JS unit tests
        run: node --test app/test/*.test.js

  verify-live:
    name: Verify data vs live Lagoon API
    # A drift MONITOR, not a gate. The unit tests above (fully mocked) gate every
    # push/PR; this one hits the live, undocumented, no-SLA Lagoon API to catch
    # API-side drift (run ordering, timezone, course renumbering) the mocks can't.
    # It runs ONLY on the daily schedule + manual dispatch — never on push/PR — so a
    # flaky third party adds zero noise to normal dev. Non-blocking too: it's
    # continue-on-error, and verify_data.py skips (exit 0) when the API is unreachable.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: verify_data.py
        run: python verify_data.py
