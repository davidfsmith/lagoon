<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script>
    // Path-aware <base>, set before any relative URL is parsed.
    // In production the app lives at /lagoon/ and must work even when loaded as
    // /lagoon with no trailing slash (CloudFront doesn't redirect), so anchor to
    // "/lagoon/". Anywhere else (e.g. a local server at the web root) use a
    // relative base so it just works. JS module imports resolve against the module
    // URL, not <base>, so they're unaffected either way.
    (function () {
      var base = document.createElement("base");
      base.href = location.pathname.indexOf("/lagoon") === 0 ? "/lagoon/" : "./";
      document.head.appendChild(base);
    })();
  </script>
  <title>Hove Lagoon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <style>
    /* Dark is the default; .light forces light; with no class we follow the OS. */
    :root {
      color-scheme: dark;
      --bg:#0d0d0d; --surface:#16181c; --surface-2:#111418; --border:#2a2d33;
      --text:#e8eaed; --muted:#9aa0a6;
      --accent:#2dd4bf; --accent-ink:#06251f;
      --chip-bg:#13241f; --chip-border:#2dd4bf44; --chip-text:#cfeee7;
      --good:#34d399; --warn:#fbbf24; --danger:#f87171; --danger-border:#5a2f2f;
      --stale-bg:#3a2a12; --stale-text:#fbbf24;
      --selected-bg:#16302b; --shadow:rgba(0,0,0,.35);
    }
    :root.light {
      color-scheme: light;
      --bg:#f2f2f7; --surface:#ffffff; --surface-2:#e9e9ee; --border:#d0d3d8;
      --text:#1c1c1e; --muted:#6b7280;
      --accent:#0d9488; --accent-ink:#ffffff;
      --chip-bg:#e6faf6; --chip-border:#99e6dc; --chip-text:#0f766e;
      --good:#059669; --warn:#b45309; --danger:#dc2626; --danger-border:#f3c2c2;
      --stale-bg:#fef3c7; --stale-text:#92400e;
      --selected-bg:#d3f5ee; --shadow:rgba(0,0,0,.12);
    }
    @media (prefers-color-scheme: light) {
      :root:not(.dark) {
        color-scheme: light;
        --bg:#f2f2f7; --surface:#ffffff; --surface-2:#e9e9ee; --border:#d0d3d8;
        --text:#1c1c1e; --muted:#6b7280;
        --accent:#0d9488; --accent-ink:#ffffff;
        --chip-bg:#e6faf6; --chip-border:#99e6dc; --chip-text:#0f766e;
        --good:#059669; --warn:#b45309; --danger:#dc2626; --danger-border:#f3c2c2;
        --stale-bg:#fef3c7; --stale-text:#92400e;
        --selected-bg:#d3f5ee; --shadow:rgba(0,0,0,.12);
      }
    }

    * { box-sizing: border-box; }
    /* App-shell layout: body is a fixed-height flex column (header · scrolling main · nav),
       so the DOCUMENT never scrolls — only <main> does. That removes the iOS momentum-scroll
       stale-paint bug that plagued a position:fixed nav (v29/v36 tried translateZ + will-change
       + backface-visibility compositor hints; they rotted across iOS updates). With no document
       scroll there's no momentum surface for an in-flow nav to be left behind by. */
    body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,Roboto,system-ui,sans-serif;
      height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
    header { flex:none; display:flex; justify-content:space-between; align-items:center; padding:14px 16px; font-weight:600; font-size:17px; border-bottom:1px solid var(--border); background:var(--bg); }
    header .accent { color:var(--accent); }
    .icon-btn { background:none; border:none; color:var(--muted); font-size:19px; line-height:1; cursor:pointer; padding:4px 6px; }
    /* The only scroll container. min-height:0 lets the flex item shrink so it scrolls
       internally instead of growing the body; overscroll-behavior stops rubber-band chaining. */
    main { flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain;
      width:100%; max-width:560px; margin:0 auto; padding:14px 14px 24px; }
    h2 { margin:0 0 12px; }
    /* In-flow bottom bar (not position:fixed anymore — see the app-shell note above).
       Pad by the iOS home-indicator inset (viewport-fit=cover) so the buttons sit above
       the system gesture area, otherwise taps near the bottom can trigger the iOS
       app-switcher/close bar instead of the nav. */
    nav { flex:none; display:flex; background:var(--surface-2); border-top:1px solid var(--border); padding-bottom:env(safe-area-inset-bottom); }
    nav[hidden] { display:none; } /* type selector above beats the UA [hidden] rule, so restore it (hidden on the sign-in page) */
    nav button { flex:1; background:none; border:none; color:var(--muted); padding:14px 12px; font-size:13px; }
    nav button.active { color:var(--accent); }
    .stale { background:var(--stale-bg); color:var(--stale-text); font-size:12px; padding:6px 10px; border-radius:8px; margin-bottom:10px; }
    .muted { color:var(--muted); } .err { color:var(--danger); }
    button.primary { background:var(--accent); color:var(--accent-ink); border:none; border-radius:8px; padding:10px 14px; font-weight:600; }
    input { width:100%; padding:11px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text); margin-bottom:10px; }
  </style>
  <script>
    /* Apply saved theme before first paint (no flash). */
    (function () {
      var t = localStorage.getItem("lagoon.theme");
      if (t === "light" || t === "dark") document.documentElement.classList.add(t);
    })();
  </script>
</head>
<body>
  <header>
    <span>🏄 <span class="accent">Hove Lagoon</span></span>
    <button id="btn-settings" class="icon-btn" aria-label="Settings" title="Settings">⚙</button>
  </header>
  <main id="view"></main>
  <nav id="nav" hidden>
    <button data-route="lastminute" hidden><span class="nav-emoji">🔥</span> Last-minute</button>
    <button data-route="agenda" class="active">Availability</button>
    <button data-route="account">Bookings</button>
  </nav>
  <script>
    // Load the entry module via JS so its URL resolves against the <base> set above — not
    // speculatively by the preload scanner, which fetches a static `src` against the raw
    // document URL and 404s /js/app.js when the app is opened at /lagoon (no trailing slash).
    (function () {
      var s = document.createElement("script");
      s.type = "module";
      s.src = new URL("js/app.js", document.baseURI).href;
      document.head.appendChild(s);
    })();
  </script>
  <script>if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");</script>
</body>
</html>
